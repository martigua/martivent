name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: martivent
          POSTGRES_USER: martivent
          POSTGRES_PASSWORD: martivent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U martivent -d martivent"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      SECRET_KEY: ci-only-secret-not-for-real-deployments-2026-abcdef
      DEBUG: "false"
      SECURE_SSL_REDIRECT: "false"
      ALLOWED_HOSTS: localhost
      DATABASE_URL: postgresql://martivent:martivent@localhost:5432/martivent
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
          python-version: "3.13"
          enable-cache: true
          working-directory: backend
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run python manage.py check
      - run: uv run python manage.py makemigrations --check --dry-run
      - run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --watch=false
      - run: npm run build

  production-image:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build --tag martivent:ci .
