# Local development environment. Two containers on one private network.
#   docker compose -f docker-compose.dev.yml up -d --build   # start (first time builds the image)
#   docker compose -f docker-compose.dev.yml exec dev bash    # get a shell inside linux
#   docker compose -f docker-compose.dev.yml down             # stop
name: martivent-dev

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/workspace            # your repo, live-mounted: edits on the host appear instantly inside
    ports:
      - "8000:8000"             # Django, when you run it inside the container
      - "4200:4200"             # Angular dev server
    environment:
      DATABASE_URL: postgres://martivent:martivent@db:5432/martivent
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: martivent
      POSTGRES_USER: martivent
      POSTGRES_PASSWORD: martivent
    ports:
      - "5432:5432"             # optional: reach the db from host tools too
    volumes:
      - pgdata:/var/lib/postgresql/data   # named volume: data survives `down` and restarts

volumes:
  pgdata:
