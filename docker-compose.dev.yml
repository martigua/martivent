# Local development environment. Two containers on one private network.
#   docker compose -f docker-compose.dev.yml up -d --build   # start (first time builds the image)
#   docker compose -f docker-compose.dev.yml exec dev fish    # get a shell inside linux (or: marti)
#   docker compose -f docker-compose.dev.yml down             # stop
name: martivent-dev

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        DEV_UID: "${DEV_UID:-1000}"
        DEV_GID: "${DEV_GID:-1000}"
    volumes:
      - .:/workspace            # your repo, live-mounted: edits on the host appear instantly inside
      # Host SSH agent, forwarded read-only: `git push` (git@github.com) borrows the
      # host's loaded keys at runtime. Nothing secret enters the image or container fs.
      # Falls back to /dev/null when no agent is running on the host (push then fails
      # loudly instead of the container refusing to start). Container `dev` UID matches
      # the host UID, so the socket is accessible.
      - ${SSH_AUTH_SOCK:-/dev/null}:/ssh-agent
      # Neovim plugin/state/cache: survive rebuilds so plugins aren't reinstalled
      # each time, and stay in the container (compiled plugins are arch-specific).
      - nvim-data:/home/dev/.local/share/nvim
      - nvim-state:/home/dev/.local/state/nvim
      - nvim-cache:/home/dev/.cache/nvim
    ports:
      - "8001:8000"             # host:container — Django (host 8001; 8000 was taken)
      - "4201:4200"             # host:container — Angular dev server (host 4201; 4200 was taken)
    environment:
      SECRET_KEY: dev-insecure-do-not-use-in-production
      DEBUG: "true"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgres://martivent:martivent@db:5432/martivent
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      SSH_AUTH_SOCK: /ssh-agent   # matches the forwarded socket mount above
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: martivent
      POSTGRES_USER: martivent
      POSTGRES_PASSWORD: martivent
    ports:
      - "5433:5432"             # host:container — optional host access (host 5433; 5432 often taken)
    volumes:
      - pgdata:/var/lib/postgresql/data   # named volume: data survives `down` and restarts

volumes:
  pgdata:
  nvim-data:
  nvim-state:
  nvim-cache:
