name: martivent

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SECRET_KEY: local-production-parity-secret-not-for-real-deployments-2026
      DEBUG: "false"
      SECURE_SSL_REDIRECT: "false"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgresql://martivent:martivent@db:5432/martivent
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: martivent
      POSTGRES_USER: martivent
      POSTGRES_PASSWORD: martivent
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U martivent -d martivent"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
